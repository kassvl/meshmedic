id: latency-regression-vs-baseline
title: Service latency above its learned baseline
severity: warning
description: >
  A service's p99 request latency has climbed to a multiple of its own
  learned normal. This catches regressions that are abnormal for this
  cluster but sit below any fixed SLO number: a service that normally
  answers in 50 ms and now takes 300 ms is in trouble, yet a static
  1000 ms threshold would miss it entirely. The threshold here is relative:
  once the baseline has warmed up on healthy traffic, the signal fires at
  baselineMultiplier times the learned normal. Until then the static
  threshold applies, so a cold start never fires on noise. No patch is
  proposed: a latency regression's cause is usually a recent rollout or
  resource pressure, which the operator investigates from the evidence
  and the rollout history, not an improvised config change.
signal:
  promql: >
    histogram_quantile(0.99, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=~"destination|waypoint",
    destination_service_name="{{.service}}", destination_service_namespace="{{.namespace}}"}[2m])))
  comparison: ">"
  threshold: 1000
  for: 90s
  baselineMultiplier: 3
  baselineMinSamples: 20
evidence:
  # The p99 broken out by workload version, so the report names which
  # subset regressed instead of only the service-wide number.
  - name: p99-by-version-ms
    promql: >
      histogram_quantile(0.99, sum by (le, destination_version) (rate(istio_request_duration_milliseconds_bucket{reporter=~"destination|waypoint",
      destination_service_name="{{.service}}", destination_service_namespace="{{.namespace}}"}[5m])))
  # Request rate, so a p99 computed over a trickle of traffic is not
  # mistaken for a real regression.
  - name: request-rate-per-s
    promql: >
      sum(rate(istio_requests_total{reporter=~"destination|waypoint", destination_service_name="{{.service}}",
      destination_service_namespace="{{.namespace}}"}[2m]))
remediation:
  target:
    apiVersion: apps/v1
    kind: Deployment
  action: report-only
guardrails:
  requiresApproval: true
  maxAppliesPerHour: 1
rollback: >
  Not applicable: nothing is applied. Find the workload named in
  p99-by-version-ms and check what rolled out to it recently; a bad image,
  a lowered CPU limit, or an injected latency knob is the usual cause. If
  the higher latency is legitimate and permanent (a genuine change in the
  workload), raise the baseline by letting it relearn, or set an explicit
  static threshold on this entry for the service.
