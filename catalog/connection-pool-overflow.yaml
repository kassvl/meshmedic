id: connection-pool-overflow
title: Requests dropped by connection pool limits
severity: warning
description: >
  Requests are failing with the UO (upstream overflow) response flag, meaning
  Envoy's circuit breaker is shedding load because the configured connection
  pool for the destination is exhausted. If the destination has spare capacity
  (CPU and memory healthy), the limits are simply undersized for current
  traffic and can be raised. If the destination is saturated, raising limits
  makes things worse; the evidence queries make that call reviewable.
signal:
  promql: >
    sum(rate(istio_requests_total{reporter=~"source|waypoint", destination_service_name="{{.service}}",
    destination_service_namespace="{{.namespace}}", response_flags="UO"}[2m]))
  comparison: ">"
  threshold: 1
  for: 60s
evidence:
  # Mesh-native queries only: the previous cpu/envoy_cluster evidence needed
  # cadvisor scraping and the Envoy stats annotation, neither of which the
  # stock Istio Prometheus addon provides, so it always came back empty.
  - name: uo-rate-by-workload
    promql: >
      sum by (destination_workload) (rate(istio_requests_total{reporter=~"source|waypoint", destination_service_name="{{.service}}",
      destination_service_namespace="{{.namespace}}", response_flags="UO"}[2m]))
  - name: request-rate-by-workload
    promql: >
      sum by (destination_workload) (rate(istio_requests_total{reporter=~"destination|waypoint", destination_service_name="{{.service}}",
      destination_service_namespace="{{.namespace}}"}[2m]))
objectEvidence:
  # The saturation call (raise limits vs scale the workload) needs the
  # destination's configured resources next to the traffic numbers.
  - name: destination-resources
    apiVersion: apps/v1
    kind: Deployment
    object: "{{.workload}}"
    namespace: "{{.namespace}}"
    fields:
      - spec.replicas
      - spec.template.spec.containers[*].resources
suppresses:
  # Overflow-shed requests surface as 503s and inflate the 5xx ratio; that
  # is this incident's symptom, not a second incident.
  - error-surge-outlier-ejection
remediation:
  target:
    apiVersion: networking.istio.io/v1
    kind: DestinationRule
  action: raise-connection-pool-limits
  patchTemplate: |
    apiVersion: networking.istio.io/v1
    kind: DestinationRule
    metadata:
      name: {{.service}}-pool
      namespace: {{.namespace}}
    spec:
      host: {{.service}}
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 512
          http:
            http1MaxPendingRequests: 256
            http2MaxRequests: 512
guardrails:
  requiresApproval: true
  maxAppliesPerHour: 1
rollback: >
  If UO drops but the destination starts failing under real load, the pool
  limit was doing its job; revert this patch and scale the destination
  workload instead. The reviewer should weigh request-rate-by-workload
  against the destination-resources configuration evidence before merging.
