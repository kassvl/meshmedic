id: upstream-host-ejection-flood
title: No healthy upstream hosts left
severity: critical
description: >
  Requests fail with UH (no healthy upstream). This flag has more than one
  cause and they need different fixes, so read the evidence before acting.
  Either an over-aggressive outlier policy ejected the hosts (the patch below
  relaxes the ejection ceiling), or a DestinationRule subset selector matches
  no pods while the pods themselves are healthy (a routing mismatch the
  ejection patch would not fix; correct the subset labels instead). The
  destination-rule evidence shows the subsets and the outlier policy so the
  reviewer can tell which case this is: zero active ejections plus a subset
  whose labels match nothing points at a selector mismatch, not ejection.
signal:
  promql: >
    sum(rate(istio_requests_total{reporter=~"source|waypoint", destination_service_name="{{.service}}",
    destination_service_namespace="{{.namespace}}", response_flags="UH"}[2m]))
  comparison: ">"
  threshold: 1
  for: 60s
evidence:
  - name: ejected-hosts
    promql: >
      sum(envoy_cluster_outlier_detection_ejections_active{cluster_name=~"outbound\\|.*\\|{{.service}}\\.{{.namespace}}\\..*"})
  - name: ready-endpoints
    promql: >
      sum(kube_endpoint_address_available{namespace="{{.namespace}}", endpoint="{{.service}}"})
objectEvidence:
  # The DestinationRule's subsets and outlier policy. A subset whose labels
  # match no pods, next to zero active ejections, is a selector mismatch
  # rather than an ejection flood, and the ejection patch below does not
  # apply. Reads through kubectl, so it works where the ejection and
  # endpoint metrics above need scrape config the stock addon lacks.
  - name: destination-rule
    apiVersion: networking.istio.io/v1
    kind: DestinationRule
    object: "{{.service}}"
    namespace: "{{.namespace}}"
    fields:
      - spec.subsets
      - spec.trafficPolicy.outlierDetection
remediation:
  target:
    apiVersion: networking.istio.io/v1
    kind: DestinationRule
  action: cap-ejection-percent
  patchTemplate: |
    apiVersion: networking.istio.io/v1
    kind: DestinationRule
    metadata:
      name: {{.service}}-outlier
      namespace: {{.namespace}}
    spec:
      host: {{.service}}
      trafficPolicy:
        outlierDetection:
          consecutive5xxErrors: 10
          interval: 30s
          baseEjectionTime: 30s
          maxEjectionPercent: 25
          minHealthPercent: 50
guardrails:
  requiresApproval: true
  maxAppliesPerHour: 1
rollback: >
  If ready-endpoints evidence shows zero, the workload itself is down and no
  mesh patch helps; this entry only applies when Kubernetes reports ready
  endpoints that the mesh refuses to use. Restore the previous ejection policy
  after the incident review.
