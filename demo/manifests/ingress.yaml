# North-south ingress: an Istio Gateway (istio class) fronts the payments
# service, so the testbed can model edge incidents, where users cannot reach
# the app because the ingress route or its backend is broken. A dedicated
# loadgen drives traffic through the gateway so the ingress telemetry is
# continuous. On kind the Gateway's external address stays pending (no
# LoadBalancer), but routing works through the cluster-internal service.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress
  namespace: demo
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: payments-ingress
  namespace: demo
spec:
  parentRefs:
    - name: ingress
  hostnames:
    - "payments.example.com"
  rules:
    - backendRefs:
        - name: payments
          port: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-loadgen
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-loadgen
  template:
    metadata:
      labels:
        app: ingress-loadgen
    spec:
      containers:
        - name: loadgen
          image: curlimages/curl:8.11.1
          command: ["sh", "-c"]
          args:
            - 'while true; do curl -s -o /dev/null -H "Host: payments.example.com" http://ingress-istio:80/; sleep 0.2; done'
