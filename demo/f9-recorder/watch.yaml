# F9 live demo: baseline the service-wide p99 latency for payments and record
# a fingerprint when it deviates while no catalog scenario is active. Short
# interval so the baseline warms up fast for the demo. report-only (no gitops).
prometheus: http://127.0.0.1:9090
interval: 5s
targets:
  - params:
      service: payments
      namespace: demo
      workload: payments-v2
      subset: v2
      stable_subset: v1
baselineState: /tmp/meshmedic-baseline.json
unmatchedLog: /tmp/meshmedic-unmatched.jsonl
anomalyWatch:
  - name: payments-service-p99-latency
    promql: >
      histogram_quantile(0.99, sum by (le) (rate(istio_request_duration_milliseconds_bucket{reporter=~"destination|waypoint", destination_service_name="{{.service}}", destination_service_namespace="{{.namespace}}"}[2m])))
