# Watch config for the demo environment. Assumes
# kubectl -n istio-system port-forward svc/prometheus 9090:9090 is running.
prometheus: http://127.0.0.1:9090
interval: 15s
gitops:
  repo: kassvl/meshmedic-demo-config
  path: istio/{{.namespace}}/{{.service}}-{{.scenario}}.yaml
targets:
  - params:
      service: payments
      namespace: demo
      workload: payments-v2
      subset: v2
      stable_subset: v1
    scenarios: [canary-latency-rollback]
